<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3" />
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background rounded box -->
  <rect x="5" y="5" width="90" height="90" rx="24" fill="#0f172a" stroke="url(#neonGradient)" stroke-width="2"/>

  <!-- Glowing key / storage gear design -->
  <g transform="translate(15, 15) scale(0.7)" filter="url(#glow)">
    <!-- Gear circle top -->
    <circle cx="50" cy="35" r="20" fill="none" stroke="url(#neonGradient)" stroke-width="8" />
    <!-- Gear teeth details -->
    <path d="M 50,5 L 50,15 M 50,55 L 50,65 M 20,35 L 30,35 M 70,35 L 80,35 M 28.8,13.8 L 35.8,20.8 M 64.2,49.2 L 71.2,56.2 M 28.8,56.2 L 35.8,49.2 M 64.2,13.8 L 71.2,20.8" fill="none" stroke="url(#neonGradient)" stroke-width="6" stroke-linecap="round" />
    <!-- Inner lock circle hole -->
    <circle cx="50" cy="35" r="6" fill="#0f172a" stroke="url(#neonGradient)" stroke-width="4" />
    
    <!-- Key shaft -->
    <line x1="50" y1="55" x2="50" y2="90" stroke="url(#neonGradient)" stroke-width="8" stroke-linecap="round" />
    <!-- Key teeth -->
    <path d="M 50,75 L 65,75 M 50,85 L 65,85" stroke="url(#neonGradient)" stroke-width="8" stroke-linecap="round" />
  </g>
</svg>
